version: "3.8"

services:
  router:
    build: .
    ports:
      - "${PORT:-9981}:9981"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - TZ=Asia/Shanghai
    volumes:
      - router-data:/app/data
    env_file:
      - .env
    restart: unless-stopped

volumes:
  router-data:
